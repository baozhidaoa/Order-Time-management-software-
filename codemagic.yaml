workflows:
  mac_internal_unsigned:
    name: macOS Internal Unsigned
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      groups:
        - github_release
      xcode: 16.2
      node: 20.19.4
      vars:
        NODE_VERSION: "20.19.4"
        CSC_IDENTITY_AUTO_DISCOVERY: "false"
    cache:
      cache_paths:
        - $HOME/.npm
        - node_modules
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
      tag_patterns:
        - pattern: v*
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Install desktop dependencies
        script: |
          cd "$CM_BUILD_DIR"
          npm ci
      - name: Build macOS artifacts
        script: |
          cd "$CM_BUILD_DIR"
          npm run ci:mac
    artifacts:
      - dist/*.dmg
      - dist/*.zip
    publishing:
      scripts:
        - name: Upload macOS artifacts to GitHub release
          script: |
            if [ -z "${CM_TAG:-}" ]; then
              echo "Not a tag build, skipping GitHub release upload."
              exit 0
            fi

            cd "$CM_BUILD_DIR"
            node scripts/upload-github-release-assets.mjs \
              --repo "baozhidaoa/Order-Time-management-software-" \
              --tag "$CM_TAG" \
              --dir "$CM_BUILD_DIR/dist" \
              --ext ".dmg" \
              --ext ".zip"

  ios_internal_testflight:
    name: iOS Internal TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      groups:
        - github_release
        - apple_credentials
      xcode: 16.2
      cocoapods: default
      node: 20.19.4
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.controler.timetracker
      vars:
        NODE_VERSION: "20.19.4"
        BUNDLE_ID: "com.controler.timetracker"
        XCODE_SCHEME: "ControlerApp"
        XCODE_WORKSPACE: "$CM_BUILD_DIR/ControlerApp/ios/ControlerApp.xcworkspace"
    cache:
      cache_paths:
        - $HOME/.npm
        - node_modules
        - ControlerApp/node_modules
        - ControlerApp/vendor/bundle
        - $HOME/Library/Caches/CocoaPods
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: v*
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Verify App Store Connect credentials
        script: |
          if [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ] || [ -z "$APP_STORE_CONNECT_KEY_ID" ] || [ -z "$APP_STORE_CONNECT_ISSUER_ID" ]; then
            echo "Missing App Store Connect credentials. Add APP_STORE_CONNECT_PRIVATE_KEY, APP_STORE_CONNECT_KEY_ID, and APP_STORE_CONNECT_ISSUER_ID in Codemagic before running this workflow."
            exit 1
          fi
      - name: Bridge Codemagic Apple key aliases
        script: |
          echo "APP_STORE_CONNECT_KEY_IDENTIFIER=$APP_STORE_CONNECT_KEY_ID" >> "$CM_ENV"
      - name: Install root dependencies
        script: |
          cd "$CM_BUILD_DIR"
          npm ci
      - name: Install mobile dependencies
        script: |
          cd "$CM_BUILD_DIR/ControlerApp"
          npm ci
      - name: Sync shared web assets
        script: |
          cd "$CM_BUILD_DIR"
          npm run prepare:web-assets
          npm run verify:parity
      - name: Install Ruby gems
        script: |
          cd "$CM_BUILD_DIR/ControlerApp"
          bundle config set path vendor/bundle
          bundle install
      - name: Install CocoaPods dependencies
        script: |
          cd "$CM_BUILD_DIR/ControlerApp/ios"
          bundle exec pod install
      - name: Set up code signing
        script: |
          xcode-project use-profiles \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --custom-export-options='{"testFlightInternalTestingOnly": true}'
      - name: Build ipa
        script: |
          cd "$CM_BUILD_DIR/ControlerApp"
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - ControlerApp/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
      scripts:
        - name: Upload iOS artifacts to GitHub release
          script: |
            if [ -z "${CM_TAG:-}" ]; then
              echo "Not a tag build, skipping GitHub release upload."
              exit 0
            fi

            cd "$CM_BUILD_DIR"
            node scripts/upload-github-release-assets.mjs \
              --repo "baozhidaoa/Order-Time-management-software-" \
              --tag "$CM_TAG" \
              --dir "$CM_BUILD_DIR/ControlerApp/build/ios/ipa" \
              --ext ".ipa"
