<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>待办与打卡</title>
        <script defer src="mobile-common-boot.js"></script>
    <script defer src="todo-boot.js"></script>
<link rel="stylesheet" href="index.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        height: auto;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
      }

      .todo-main {
        min-height: 0;
        overflow-x: hidden;
      }

      .todo-shell {
        margin: 15px;
        padding: 15px;
        background-color: var(--bg-secondary);
        border-radius: 15px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        min-height: auto;
        width: auto;
        flex: 0 0 auto;
        align-self: stretch;
      }

      .todo-panel-stack {
        display: flex;
        flex-direction: column;
        gap: 15px;
        min-height: auto;
        width: 100%;
        flex: 0 0 auto;
        align-items: stretch;
      }

      .todo-primary-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .todo-primary-actions,
      .todo-view-toggle {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .todo-view-toggle .bts.active {
        background-color: var(--accent-color);
        color: var(--button-text);
      }

      .todo-control-strip {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .todo-dropdown-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .todo-dropdown-field,
      .todo-tools-field {
        min-width: 0;
        flex: 1 1 180px;
      }

      .todo-tools-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 15px;
      }

      .todo-tools-input {
        width: 100%;
        padding: 10px 15px;
        border-radius: 8px;
        border: 1px solid var(--bg-tertiary);
        background-color: var(--bg-quaternary);
        color: var(--text-color);
        font-size: 14px;
        box-sizing: border-box;
      }

      .todo-content-card {
        padding: 15px;
        background-color: color-mix(
          in srgb,
          var(--bg-tertiary) 84%,
          transparent
        );
        border: 1px solid var(--bg-tertiary);
        border-radius: 15px;
        min-height: 150px;
        height: auto;
        width: 100%;
        flex: 0 0 auto;
        overflow: visible;
      }

      .todo-stats-shell {
        padding: 15px;
        background-color: color-mix(
          in srgb,
          var(--bg-tertiary) 84%,
          transparent
        );
        border: 1px solid var(--bg-tertiary);
        border-radius: 15px;
        width: 100%;
        flex: 0 0 auto;
      }

      .todo-item {
        background-color: var(--bg-tertiary);
        border-radius: 22px;
        padding: 12px;
        color: var(--text-color);
        transition: all 0.3s ease;
        border-left: 5px solid var(--todo-item-accent, var(--accent-color));
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .todo-item.completed {
        opacity: 0.7;
        border-left-color: var(--bg-quaternary);
      }

      .todo-item.completed .todo-title {
        text-decoration: line-through;
      }

      .todo-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
      }

      .todo-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        flex-wrap: wrap;
      }

      .todo-title {
        font-size: 16px;
        font-weight: bold;
        color: var(--text-color);
        margin: 0;
      }

      .todo-due-date {
        font-size: 14px;
        color: var(--accent-color);
        background-color: rgba(var(--accent-color-rgb), 0.18);
        padding: 4px 8px;
        border-radius: 6px;
      }

      .todo-due-date.overdue {
        background-color: rgba(255, 107, 107, 0.2);
        color: var(--delete-btn);
      }

      .todo-due-date.today {
        background-color: rgba(var(--accent-color-rgb), 0.26);
        color: var(--accent-color);
        font-weight: bold;
      }

      .todo-description {
        font-size: 13px;
        color: var(--muted-text-color);
        line-height: 1.4;
        margin: 0;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .todo-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .todo-progress-lane {
        min-width: 0;
        flex: 1 1 240px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .todo-progress-bottom-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-width: 0;
      }

      .todo-progress-caption,
      .todo-progress-empty {
        color: var(--muted-text-color);
      }

      .todo-progress-empty {
        margin: 0;
      }

      .todo-tags {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .todo-tag {
        font-size: 12px;
        padding: 4px 8px;
        background-color: var(--bg-quaternary);
        border-radius: 4px;
        color: var(--text-color);
      }

      .todo-action-stack {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
        flex: 0 0 auto;
      }

      .todo-swipe-shell {
        position: relative;
        min-width: 0;
        width: 100%;
        max-width: 100%;
        overflow: hidden;
        isolation: isolate;
        --todo-swipe-action-width: 92px;
        --todo-swipe-progress: 0;
      }

      .todo-swipe-card {
        position: relative;
        z-index: 1;
        min-width: 0;
        transition:
          transform 220ms cubic-bezier(0.22, 0.78, 0.2, 1),
          box-shadow 220ms ease;
        will-change: transform;
      }

      .todo-swipe-shell.is-swiping .todo-swipe-card {
        transition: none;
      }

      .todo-swipe-shell.is-open .todo-swipe-card {
        box-shadow: -14px 0 26px rgba(0, 0, 0, 0.18);
      }

      .todo-swipe-actions {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: var(--todo-swipe-action-width);
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        pointer-events: none;
        border-radius: inherit;
        opacity: var(--todo-swipe-progress);
        transform: translate3d(
          calc((1 - var(--todo-swipe-progress)) * 14px),
          0,
          0
        );
        transition:
          opacity 180ms ease,
          transform 180ms ease;
      }

      .todo-swipe-shell.is-swiping .todo-swipe-actions {
        transition: none;
      }

      .todo-swipe-delete-btn {
        width: 100%;
        min-height: 100%;
        border: none;
        border-radius: inherit;
        position: relative;
        overflow: hidden;
        isolation: isolate;
        pointer-events: auto;
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        -webkit-appearance: none;
        appearance: none;
        -webkit-tap-highlight-color: transparent !important;
        -webkit-touch-callout: none;
        -webkit-focus-ring-color: transparent;
        outline: none !important;
        color: #fff;
        background:
          linear-gradient(
            180deg,
            color-mix(in srgb, var(--delete-btn) 82%, white 10%),
            color-mix(in srgb, var(--delete-btn) 88%, black 12%)
          );
        box-shadow:
          inset 1px 0 0 rgba(255, 255, 255, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        opacity: calc(var(--todo-swipe-progress) * 0.98);
        transform: scale(calc(0.94 + var(--todo-swipe-progress) * 0.06))
          translateZ(0);
        transition:
          opacity 180ms ease,
          transform 180ms ease,
          filter 180ms ease,
          box-shadow 180ms ease;
      }

      .todo-swipe-delete-btn::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 5px;
        height: 5px;
        background: rgba(255, 255, 255, 0.22);
        opacity: 0;
        border-radius: 999px;
        transform: scale(1, 1) translate(-50%);
        transform-origin: 50% 50%;
        pointer-events: none;
      }

      .todo-swipe-delete-btn:active {
        transform: scale(calc(0.92 + var(--todo-swipe-progress) * 0.06))
          translateY(1px);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.12),
          0 12px 26px rgba(0, 0, 0, 0.18);
        filter: brightness(1.05);
      }

      .todo-swipe-delete-btn:active::after {
        animation: ripple 0.6s ease-out;
      }

      .todo-swipe-delete-btn:focus,
      .todo-swipe-delete-btn:focus-visible {
        outline: none !important;
        box-shadow:
          inset 1px 0 0 rgba(255, 255, 255, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.08) !important;
      }

      .todo-swipe-shell:not(.is-open):not(.is-swiping) .todo-swipe-delete-btn {
        pointer-events: none;
      }

      .todo-swipe-delete-btn:hover,
      .todo-swipe-delete-btn:focus-visible {
        filter: brightness(1.04);
      }

      .todo-swipe-delete-btn:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .checkin-item {
        width: 100%;
        box-sizing: border-box;
      }

      .todo-action-btn {
        padding: 6px 12px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
      }

      .todo-progress-btn {
        background: color-mix(
          in srgb,
          var(--accent-color) 18%,
          var(--bg-quaternary)
        );
        color: var(--accent-color);
        border: 1px solid
          color-mix(in srgb, var(--accent-color) 45%, transparent);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        text-align: center;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        font-weight: 600;
        padding: 0;
      }

      .complete-btn {
        background-color: var(--accent-color);
        color: var(--on-accent-text);
      }

      .todo-content-card--compact {
        min-height: auto;
        width: 100%;
        max-width: 100%;
        flex: 0 0 auto;
        align-self: stretch;
      }

      .checkin-record {
        background-color: color-mix(
          in srgb,
          var(--bg-secondary) 78%,
          transparent
        );
        border: 1px solid color-mix(in srgb, var(--bg-quaternary) 80%, transparent);
        border-radius: 14px;
        padding: 8px 10px;
        margin-top: 8px;
      }

      .checkin-records-inline {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 2px;
        scrollbar-width: thin;
        max-width: 100%;
      }

      .checkin-records-inline .checkin-record {
        margin-top: 0;
        flex: 0 0 auto;
      }

      .checkin-records-inline .checkin-message,
      .checkin-item .checkin-description {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .checkin-records-inline .checkin-message {
        -webkit-line-clamp: 1;
      }

      .checkin-date {
        font-size: 12px;
        color: var(--muted-text-color);
      }

      .checkin-message {
        font-size: 14px;
        color: var(--text-color);
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-color);
      }

      .empty-state-icon {
        font-size: 48px;
        margin-bottom: 15px;
      }

      #todo-list-container,
      #todo-quadrant-container,
      #checkin-list-container {
        width: 100%;
        height: auto;
        flex: 0 0 auto;
      }

      @media (max-width: 760px) {
        .todo-tools-row {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 690px) {
        .todo-topbar {
          height: auto !important;
          min-height: 48px;
          padding: 10px 12px;
        }

        .todo-shell {
          margin: 10px 6px 6px;
          padding: 12px;
          border-radius: 12px;
          gap: 10px;
        }

        .todo-primary-toolbar {
          flex-wrap: nowrap;
          align-items: stretch;
          gap: 6px;
        }

        .todo-primary-toolbar .todo-view-toggle {
          flex: 1 1 auto;
          gap: 6px;
        }

        .todo-primary-toolbar .todo-view-toggle .bts,
        .todo-primary-toolbar .todo-primary-actions .bts {
          margin: 0;
          padding: 6px 8px !important;
          font-size: 11px !important;
        }

        .todo-primary-toolbar .todo-view-toggle .bts {
          flex: 1 1 0;
        }

        .todo-dropdown-row {
          display: grid;
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 6px;
        }

        .todo-dropdown-field,
        .todo-tools-field {
          width: 100%;
          flex: 1 1 100%;
        }

        .todo-item {
          position: relative;
        }

        .todo-swipe-shell {
          --todo-swipe-action-width: 92px;
        }

        .todo-swipe-delete-btn {
          font-size: 12px;
        }

        .todo-footer {
          flex-direction: column;
          align-items: stretch;
          gap: 10px;
        }

        .todo-footer.is-progress-empty .todo-progress-bottom-row {
          flex-wrap: wrap;
          align-items: stretch;
        }

        .todo-progress-lane {
          width: 100%;
          flex: 1 1 auto;
        }

        .todo-footer.is-progress-empty .todo-progress-lane {
          flex-basis: 100%;
        }

        .todo-action-stack {
          position: static;
          width: 100%;
          flex-direction: row;
          justify-content: flex-end;
          align-items: center;
          gap: 8px;
        }

        .todo-action-btn {
          padding: 5px 10px !important;
          font-size: 11px !important;
        }
      }
    </style>
  </head>
  <body class="app-layout page-todo todo-bootstrap-pending bgs bkg flex row">
    <div
      class="app-sidebar flex column ms mgt mgb"
      style="height: 100vh; width: 11%"
    >
      <div class="app-sidebar-spacer flex ms" style="height: 20%"></div>
      <div class="app-nav flex flex1 column ms mgt">
        <button class="bts" type="button" data-nav-page="index" onclick="if (window.ControlerUI?.navigateAppPage?.('index')) return false; window.location.href = 'index.html'; return false;">
          记录
        </button>
        <button class="bts" type="button" data-nav-page="stats" onclick="if (window.ControlerUI?.navigateAppPage?.('stats')) return false; window.location.href = 'stats.html'; return false;">
          统计
        </button>
        <button class="bts" type="button" data-nav-page="plan" onclick="if (window.ControlerUI?.navigateAppPage?.('plan')) return false; window.location.href = 'plan.html'; return false;">
          计划
        </button>
        <button class="bts" type="button" data-nav-page="todo" onclick="if (window.ControlerUI?.navigateAppPage?.('todo')) return false; window.location.href = 'todo.html'; return false;">
          待办
        </button>
        <button class="bts" type="button" data-nav-page="diary" onclick="if (window.ControlerUI?.navigateAppPage?.('diary')) return false; window.location.href = 'diary.html'; return false;">
          日记
        </button>
        <button class="bts" type="button" data-nav-page="settings" onclick="if (window.ControlerUI?.navigateAppPage?.('settings')) return false; window.location.href = 'settings.html'; return false;">
          设置
        </button>
      </div>
    </div>

    <div class="app-main todo-main flex flex1 column mg ms" style="overflow-y: auto">
      <div class="todo-topbar flex juzhong ms mg" style="height: 7%">
        <h2 style="margin: 0; color: var(--text-color)">待办与打卡</h2>
      </div>

      <div class="todo-shell">
        <div class="todo-panel-stack">
          <div class="todo-primary-toolbar">
            <div class="todo-view-toggle">
              <button class="bts active" id="todo-view-btn">📝 待办事项</button>
              <button class="bts" id="checkin-view-btn">✅ 打卡项目</button>
            </div>
            <div class="todo-primary-actions">
              <button class="bts" id="add-todo-btn">➕ 添加项目</button>
            </div>
          </div>

          <div id="todo-view-controls" style="display: block">
            <div class="todo-control-strip">
              <div class="todo-dropdown-row">
                <div class="todo-dropdown-field">
                  <select id="todo-filter-select" class="todo-tools-input">
                    <option value="all">全部</option>
                    <option value="pending">进行中</option>
                    <option value="completed">已完成</option>
                    <option value="overdue">已过期</option>
                    <option value="today">今天到期</option>
                  </select>
                </div>
                <div class="todo-dropdown-field">
                  <select id="todo-layout-select" class="todo-tools-input">
                    <option value="list">列表视图</option>
                    <option value="quadrant">四象限视图</option>
                  </select>
                </div>
                <div class="todo-dropdown-field">
                  <select id="todo-sort" class="todo-tools-input">
                    <option value="dueDate">按截止日期排序</option>
                    <option value="priority">按优先级排序</option>
                    <option value="createdAt">按创建时间排序</option>
                    <option value="title">按标题排序</option>
                  </select>
                </div>
              </div>

              <div class="todo-tools-row">
                <div class="todo-tools-field">
                  <input
                    type="text"
                    id="todo-search"
                    class="todo-tools-input"
                    placeholder="搜索待办事项..."
                  />
                </div>
              </div>
            </div>
          </div>

          <div id="checkin-view-controls" style="display: none">
            <div
              class="todo-content-card todo-content-card--compact"
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 10px;
                flex-wrap: wrap;
                padding: 10px;
              "
            >
              <div style="color: var(--text-color); font-size: 14px">
                <span>今日打卡统计：</span>
                <span id="today-checkin-count">0</span>/<span id="total-checkin-count">0</span>
              </div>
              <div style="color: var(--text-color); font-size: 14px">
                连续打卡最长：<span id="max-streak-days">0</span>天
              </div>
            </div>
          </div>

          <template id="empty-state-template">
            <div class="empty-state">
              <div class="empty-state-icon">📝</div>
              <h3 style="color: var(--text-color)">暂无待办事项</h3>
              <p style="color: var(--muted-text-color); margin-bottom: 20px">
                点击"添加项目"按钮开始创建
              </p>
              <button class="bts" id="add-first-todo-btn">创建第一个待办事项</button>
            </div>
          </template>

          <div id="todo-list-container" class="todo-content-card resizable-panel"></div>
          <div
            id="todo-quadrant-container"
            class="todo-content-card resizable-panel"
            style="display: none"
          ></div>
          <div
            id="checkin-list-container"
            class="todo-content-card resizable-panel"
            style="display: none"
          ></div>

          <div class="todo-stats-shell">
            <h3 id="stats-panel-title" style="margin: 0 0 15px 0; color: var(--text-color)">
              待办事项统计
            </h3>

            <div
              id="todo-stats-panel"
              style="
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 4px;
              "
            >
              <div
                class="todo-stats-card todo-stats-card--total"
                style="background-color: var(--bg-tertiary); padding: 15px; border-radius: 10px"
              >
                <div style="color: var(--text-color); font-size: 14px; margin-bottom: 5px">
                  总计
                </div>
                <div
                  id="total-todos"
                  style="color: var(--accent-color); font-size: 24px; font-weight: bold"
                >
                  0
                </div>
              </div>
              <div
                class="checkin-stats-card checkin-stats-card--total"
                style="background-color: var(--bg-tertiary); padding: 15px; border-radius: 10px"
              >
                <div style="color: var(--text-color); font-size: 14px; margin-bottom: 5px">
                  进行中
                </div>
                <div
                  id="pending-todos"
                  style="color: var(--accent-color); font-size: 24px; font-weight: bold"
                >
                  0
                </div>
              </div>
              <div style="background-color: var(--bg-tertiary); padding: 15px; border-radius: 10px">
                <div style="color: var(--text-color); font-size: 14px; margin-bottom: 5px">
                  已完成
                </div>
                <div
                  id="completed-todos"
                  style="color: var(--bg-quaternary); font-size: 24px; font-weight: bold"
                >
                  0
                </div>
              </div>
              <div style="background-color: var(--bg-tertiary); padding: 15px; border-radius: 10px">
                <div style="color: var(--text-color); font-size: 14px; margin-bottom: 5px">
                  今日到期
                </div>
                <div
                  id="today-todos"
                  style="color: var(--delete-btn); font-size: 24px; font-weight: bold"
                >
                  0
                </div>
              </div>
            </div>

            <div
              id="checkin-stats-panel"
              style="
                display: none;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 4px;
              "
            >
              <div style="background-color: var(--bg-tertiary); padding: 15px; border-radius: 10px">
                <div style="color: var(--text-color); font-size: 14px; margin-bottom: 5px">
                  打卡项目数
                </div>
