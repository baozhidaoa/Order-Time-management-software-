<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桌面小组件</title>
    <script src="platform-contract-loader.js"></script>
    <script src="rn-bridge.js"></script>
    <script src="storage-bundle.js?v=20260317-bundle-storage"></script>
    <script src="storage-adapter.js?v=20260310-sync-storage"></script>
    <script src="widget-bridge.js"></script>
    <script src="i18n.js"></script>
    <script src="i18n-extra.js"></script>
    <script src="theme-init.js"></script>
    <link rel="stylesheet" href="index.css" />
    <script src="ui-helpers.js"></script>
    <script src="data-index.js"></script>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        background:
          radial-gradient(
            circle at top,
            var(--widget-window-glow, rgba(255, 255, 255, 0.08)),
            transparent 42%
          ),
          var(--bg-primary, #1f2522);
        color: var(--text-color, #f5fff8);
      }

      body {
        position: relative;
        box-sizing: border-box;
        padding: 8px;
      }

      body.controler-window-move-active,
      body.controler-window-move-active * {
        user-select: none !important;
        cursor: grabbing !important;
      }

      .widget-window-shell {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #widget-root {
        width: 100%;
        height: 100%;
        display: flex;
      }

      .widget-window-chrome {
        position: absolute;
        top: 8px;
        right: 8px;
        z-index: 12;
        display: flex;
        justify-content: flex-end;
        align-items: flex-start;
        padding: 6px;
        box-sizing: border-box;
        -webkit-app-region: no-drag;
      }

      .widget-window-floatbar {
        display: flex;
        align-items: center;
        gap: 6px;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 0.16s ease,
          visibility 0s linear 0.16s;
      }

      .widget-window-chrome[data-hover-active="true"] .widget-window-floatbar,
      .widget-window-chrome:hover .widget-window-floatbar,
      .widget-window-chrome:focus-within .widget-window-floatbar,
      .widget-window-floatbar:hover,
      .widget-window-floatbar:focus-within,
      body.controler-window-move-active .widget-window-floatbar {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transition-delay: 0s;
      }

      @media (pointer: coarse) {
        .widget-window-floatbar {
          opacity: 1;
          visibility: visible;
          pointer-events: auto;
          transition-delay: 0s;
        }
      }

      .widget-window-action {
        min-width: 30px;
        height: 30px;
        border: 1px solid var(--widget-control-border, rgba(255, 255, 255, 0.12));
        border-radius: 999px;
        background: var(--widget-control-bg, rgba(18, 24, 20, 0.42));
        color: var(--widget-control-text, var(--text-color, #f5fff8));
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        backdrop-filter: blur(12px) saturate(120%);
        -webkit-backdrop-filter: blur(12px) saturate(120%);
        -webkit-app-region: no-drag;
        user-select: none;
      }

      body.controler-electron-widget .widget-window-action,
      body.controler-electron-widget .widget-card {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }

      body.controler-electron-widget .widget-window-shell,
      body.controler-electron-widget .widget-window-action,
      body.controler-electron-widget .widget-card,
      body.controler-electron-widget .widget-preview,
      body.controler-electron-widget .widget-stats,
      body.controler-electron-widget .widget-lines,
      body.controler-electron-widget .widget-item-list,
      body.controler-electron-widget .widget-action-only-shell,
      body.controler-electron-widget .widget-empty,
      body.controler-electron-widget .widget-state-shell {
        transform: none !important;
        filter: none !important;
        will-change: auto !important;
        isolation: auto !important;
        backface-visibility: visible !important;
        -webkit-backface-visibility: visible !important;
      }

      body.controler-electron-widget .widget-card::before {
        display: none;
      }

      .widget-window-action--move {
        min-width: 44px;
        padding: 0 10px;
        color: var(--widget-accent-action-text, var(--on-accent-text, #173326));
        background: var(
          --widget-accent-action-bg,
          rgba(var(--accent-color-rgb, 142, 214, 164), 0.86)
        );
        border-color: var(
          --widget-accent-action-border,
          rgba(var(--accent-color-rgb, 142, 214, 164), 0.32)
        );
      }

      .widget-window-action--move[data-drag-mode="native"] {
        -webkit-app-region: drag;
        cursor: grab;
      }

      .widget-window-action--move[data-drag-mode="native"]:active {
        cursor: grabbing;
      }

      .widget-window-action--close {
        background: rgba(255, 126, 126, 0.84);
        border-color: rgba(255, 180, 180, 0.2);
        color: #fff;
      }

      .widget-card {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 14px;
        box-sizing: border-box;
        border-radius: 22px;
        border: 1px solid
          var(
            --widget-card-border,
            color-mix(in srgb, var(--panel-border-color, #5f7868) 88%, transparent)
          );
        background:
          linear-gradient(
            180deg,
            var(--widget-card-gloss-start, rgba(255, 255, 255, 0.08)),
            transparent 52%
          ),
          var(
            --widget-card-bg,
            color-mix(in srgb, var(--panel-strong-bg, rgba(31, 53, 42, 0.8)) 90%, transparent)
          );
        box-shadow:
          inset 0 1px 0 var(--widget-card-gloss-start, rgba(255, 255, 255, 0.08)),
          0 18px 36px var(--widget-card-shadow, rgba(3, 10, 7, 0.22));
        overflow: hidden;
        backdrop-filter: blur(16px) saturate(118%);
        -webkit-backdrop-filter: blur(16px) saturate(118%);
      }

      .widget-card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto;
        height: 42%;
        background: linear-gradient(
          180deg,
          var(--widget-card-gloss-start, rgba(255, 255, 255, 0.08)),
          transparent
        );
        pointer-events: none;
      }

      .widget-card[data-card-openable="true"] {
        cursor: pointer;
      }

      .widget-card[data-size-class="compact"] {
        padding: 10px;
        gap: 8px;
      }

      .widget-card[data-size-class="large"] {
        gap: 12px;
      }

      .widget-card[data-size-class="xlarge"] {
        gap: 14px;
        padding: 18px;
      }

      .widget-card[data-size-class="xlarge"] .widget-card-title {
        font-size: 16px;
      }

      .widget-card[data-size-class="xlarge"] .widget-card-subtitle {
        font-size: 12px;
      }

      .widget-card--action-only {
        justify-content: center;
      }

      .widget-card-header,
      .widget-preview,
      .widget-stats,
      .widget-lines,
      .widget-item-list,
      .widget-action-only-shell,
      .widget-empty,
      .widget-state-shell {
        position: relative;
        z-index: 1;
      }

      .widget-card-title {
        font-size: 14px;
        line-height: 1.2;
        font-weight: 700;
      }

      .widget-card-subtitle {
        margin-top: 3px;
        font-size: 11px;
        line-height: 1.35;
        color: var(--muted-text-color, rgba(245, 255, 248, 0.74));
      }

      .widget-action-only-shell {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .widget-action-only-button {
        width: 100%;
        height: 100%;
        border: none;
        border-radius: 18px;
        background: var(
          --widget-accent-action-bg,
          rgba(var(--accent-color-rgb, 142, 214, 164), 0.88)
        );
        color: var(--widget-accent-action-text, #fff);
        font-size: clamp(18px, 5vw, 22px);
        font-weight: 700;
        cursor: pointer;
        box-shadow: inset 0 1px 0 var(--widget-card-gloss-start, rgba(255, 255, 255, 0.08));
      }

      .widget-stats {
        display: flex;
        gap: 8px;
      }

      .widget-stat-pill {
        flex: 1;
        min-width: 0;
        padding: 6px 10px;
        border-radius: 10px;
        background: var(--widget-subtle-surface-strong, rgba(255, 255, 255, 0.1));
        border: 1px solid var(--widget-subtle-border, rgba(255, 255, 255, 0.14));
        font-size: 11px;
        font-weight: 700;
        line-height: 1.2;
      }

      .widget-lines {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .widget-line {
        font-size: 12px;
        line-height: 1.35;
        color: var(--text-color, #f5fff8);
      }

      .widget-preview {
        min-height: 0;
      }

      .widget-preview--timeline {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .widget-preview--timeline.is-compact {
        gap: 3px;
      }

      .widget-preview--timeline.is-spacious {
        gap: 6px;
      }

      .widget-timeline-row {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 6px;
        align-items: center;
      }

      .widget-timeline-row.is-today .widget-timeline-label {
        color: rgba(var(--accent-color-rgb, 142, 214, 164), 0.98);
      }

      .widget-timeline-label {
        min-width: 24px;
        font-size: 10px;
        line-height: 1;
        color: var(--muted-text-color, rgba(245, 255, 248, 0.72));
      }

      .widget-preview--timeline.is-spacious .widget-timeline-label {
        min-width: 70px;
        font-size: 11px;
      }

      .widget-timeline-track {
        position: relative;
        min-height: 18px;
        border-radius: 999px;
        background: var(--widget-track-bg, rgba(255, 255, 255, 0.08));
        border: 1px solid var(--widget-track-border, rgba(255, 255, 255, 0.12));
        overflow: hidden;
      }

      .widget-preview--timeline.is-spacious .widget-timeline-track {
        min-height: 22px;
      }

      .widget-timeline-grid {
        position: absolute;
        inset: 0;
        background-image: linear-gradient(
          to right,
          transparent calc(25% - 1px),
          var(--widget-grid-color, rgba(255, 255, 255, 0.16)) calc(25% - 1px),
          var(--widget-grid-color, rgba(255, 255, 255, 0.16)) 25%,
          transparent 25%,
          transparent calc(50% - 1px),
          var(--widget-grid-color, rgba(255, 255, 255, 0.16)) calc(50% - 1px),
          var(--widget-grid-color, rgba(255, 255, 255, 0.16)) 50%,
          transparent 50%,
          transparent calc(75% - 1px),
          var(--widget-grid-color, rgba(255, 255, 255, 0.16)) calc(75% - 1px),
          var(--widget-grid-color, rgba(255, 255, 255, 0.16)) 75%,
          transparent 75%
        );
        pointer-events: none;
      }

      .widget-timeline-placeholder {
        position: absolute;
        left: 6px;
        right: 6px;
        top: 50%;
        height: 1px;
        background: var(--widget-placeholder-color, rgba(255, 255, 255, 0.28));
        transform: translateY(-50%);
      }

      .widget-timeline-segment {
        position: absolute;
        top: 1px;
        bottom: 1px;
        border-radius: 999px;
        padding: 0 5px;
        box-sizing: border-box;
        color: #fff;
        font-size: 9px;
        line-height: 16px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        box-shadow: inset 0 0 0 1px var(--widget-color-chip-outline, rgba(255, 255, 255, 0.18));
      }

      .widget-preview--timeline.is-spacious .widget-timeline-segment {
        font-size: 10px;
        line-height: 20px;
      }

      .widget-preview--pie {
        display: grid;
        grid-template-columns: minmax(72px, var(--widget-pie-size, 96px)) minmax(0, 1fr);
        gap: 12px;
        align-items: center;
      }

      .widget-preview--pie.is-compact {
        grid-template-columns: minmax(58px, var(--widget-pie-size, 72px)) minmax(0, 1fr);
        gap: 8px;
      }

      .widget-preview--pie.is-spacious {
        grid-template-columns: minmax(104px, var(--widget-pie-size, 148px)) minmax(0, 1fr);
        gap: 18px;
      }

      .widget-card[data-widget-kind="day-pie"] .widget-preview--pie {
        flex: 1 1 auto;
        min-height: 0;
        align-content: center;
      }

      .widget-pie-shell {
        position: relative;
        width: min(var(--widget-pie-size, 96px), 100%);
        aspect-ratio: 1;
        max-width: 100%;
        justify-self: center;
      }

      .widget-pie-donut {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 50%;
      }

      .widget-pie-donut::after {
        content: "";
        position: absolute;
        inset: 24%;
        border-radius: 50%;
        background: var(
          --widget-pie-center-bg,
          color-mix(in srgb, var(--panel-bg, rgba(28, 36, 32, 0.9)) 92%, transparent)
        );
      }

      .widget-pie-legend {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .widget-pie-legend.is-spacious {
        gap: 7px;
      }

      .widget-pie-legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }

      .widget-pie-legend-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        flex: 0 0 auto;
        box-shadow: 0 0 0 1px var(--widget-color-chip-outline, rgba(255, 255, 255, 0.18));
      }

      .widget-pie-legend-text {
        min-width: 0;
        font-size: 10px;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .widget-pie-legend.is-spacious .widget-pie-legend-text {
        font-size: 11px;
        line-height: 1.3;
      }

      .widget-preview--goals {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .widget-preview--goals.is-stacked {
        grid-template-columns: 1fr;
      }

      .widget-goal-card {
        gap: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        background: var(
          --widget-goal-month-bg,
          color-mix(in srgb, rgba(255, 255, 255, 0.1) 78%, transparent)
        );
        border: 1px solid var(--widget-subtle-border, rgba(255, 255, 255, 0.16));
        min-height: 0;
      }

      .widget-goal-card.is-annual {
        background: var(
          --widget-goal-annual-bg,
          rgba(var(--accent-color-rgb, 142, 214, 164), 0.15)
        );
      }

      .widget-goal-card.is-month {
        background: var(--widget-goal-month-bg, rgba(255, 255, 255, 0.1));
      }

      .widget-goal-card.is-annual .widget-goal-accent {
        background: var(--widget-goal-annual-accent, var(--accent-color, #8ed6a4));
      }

      .widget-goal-card.is-month .widget-goal-accent {
        background: var(--widget-goal-month-accent, rgba(255, 255, 255, 0.2));
      }

      .widget-goal-accent {
        width: 4px;
        border-radius: 999px;
        flex: 0 0 auto;
        box-shadow: 0 0 0 1px var(--widget-color-chip-outline, rgba(255, 255, 255, 0.18));
      }

      .widget-goal-main {
        min-width: 0;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .widget-goal-card-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .widget-goal-card-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(
          --widget-subtle-surface,
          color-mix(in srgb, var(--bg-secondary, rgba(255, 255, 255, 0.1)) 88%, transparent)
        );
        border: 1px solid var(--widget-subtle-border, rgba(255, 255, 255, 0.1));
        color: var(--text-color, #f5fff8);
      }

      .widget-goal-card-item-text {
        min-width: 0;
        flex: 1;
      }

      .widget-goal-card-item-title {
        display: block;
        min-width: 0;
        font-size: 10px;
        line-height: 1.25;
        color: var(--text-color, #f5fff8);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .widget-goal-card-item-description {
        margin-top: 2px;
        font-size: 9px;
        line-height: 1.25;
        color: var(--muted-text-color, rgba(245, 255, 248, 0.72));
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .widget-goal-card-item-priority {
        flex: 0 0 auto;
        padding: 3px 7px;
        border-radius: 999px;
        font-size: 9px;
        line-height: 1.2;
        color: var(--widget-accent-action-text, #fff);
      }

      .widget-item-list {
        min-height: 0;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
        overflow-x: hidden;
        overflow-y: auto;
        scrollbar-gutter: stable both-edges;
      }

      .widget-item-card {
        display: flex;
        align-items: stretch;
        gap: 10px;
        padding: 9px 10px;
        min-height: 72px;
        border-radius: 10px;
        background: var(--widget-subtle-surface, rgba(255, 255, 255, 0.09));
        border: 1px solid var(--widget-subtle-border, rgba(255, 255, 255, 0.12));
        box-sizing: border-box;
      }

      .widget-item-list.is-compact .widget-item-card {
        padding: 8px;
        min-height: 64px;
      }

      .widget-item-list.is-minimal .widget-item-card {
        gap: 8px;
        min-height: 56px;
      }

      .widget-item-list.is-preview-supplementary {
        gap: 5px;
      }

      .widget-item-list.is-preview-supplementary .widget-item-card {
        padding: 8px 9px;
        gap: 8px;
      }

      .widget-item-list.is-preview-supplementary .widget-item-top {
        align-items: flex-start;
      }

      .widget-item-list.is-preview-supplementary .widget-item-title {
        font-size: 11px;
      }

      .widget-item-list.is-preview-supplementary .widget-item-badge {
        max-width: 110px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .widget-item-list.is-preview-supplementary .widget-item-meta,
      .widget-item-list.is-preview-supplementary .widget-item-note {
        margin-top: 2px;
        font-size: 9px;
      }

      .widget-item-list.is-preview-supplementary .widget-item-action {
        min-width: 46px;
        padding: 6px 8px;
        font-size: 9px;
      }

      .widget-item-list.is-preview-supplementary.is-compact .widget-item-card {
        padding: 7px 8px;
        gap: 7px;
      }

      .widget-item-list.is-preview-supplementary.is-compact .widget-item-title {
        font-size: 10px;
      }

      .widget-item-list.is-preview-supplementary.is-compact .widget-item-badge {
        max-width: 88px;
        padding: 2px 5px;
        font-size: 8px;
      }

      .widget-item-list.is-preview-supplementary.is-compact .widget-item-meta,
      .widget-item-list.is-preview-supplementary.is-compact .widget-item-note {
        font-size: 8px;
      }

      .widget-item-list.is-preview-supplementary.is-compact .widget-item-action {
        min-width: 42px;
        padding: 5px 7px;
        font-size: 8px;
      }

      .widget-item-list.is-preview-supplementary.is-minimal .widget-item-card {
        padding: 6px 7px;
        gap: 6px;
      }

      .widget-item-list.is-preview-supplementary.is-minimal .widget-item-badge {
        max-width: 72px;
      }

      .widget-item-list.is-preview-supplementary.is-minimal .widget-item-action {
        min-width: 38px;
        padding: 4px 6px;
      }

      .widget-item-accent {
        width: 4px;
        border-radius: 999px;
        flex: 0 0 auto;
        box-shadow: 0 0 0 1px var(--widget-color-chip-outline, rgba(255, 255, 255, 0.18));
      }

      .widget-item-main {
        min-width: 0;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .widget-item-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
        min-width: 0;
      }

      .widget-item-title {
        min-width: 0;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .widget-item-badge {
        flex: 0 0 auto;
        max-width: 112px;
        font-size: 9px;
        line-height: 1.2;
        padding: 3px 6px;
        border-radius: 999px;
        background: var(--widget-badge-bg, rgba(255, 255, 255, 0.12));
        color: var(
          --widget-badge-text,
          var(--muted-text-color, rgba(245, 255, 248, 0.76))
        );
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .widget-item-meta,
      .widget-item-note {
        margin-top: 3px;
        font-size: 10px;
        line-height: 1.25;
        color: var(--muted-text-color, rgba(245, 255, 248, 0.76));
        display: -webkit-box;
        overflow: hidden;
        text-overflow: ellipsis;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 1;
      }

      .widget-item-action {
        align-self: center;
        flex: 0 0 auto;
        min-width: 50px;
        border: none;
        border-radius: 999px;
        padding: 7px 10px;
        font-size: 10px;
        font-weight: 700;
        cursor: pointer;
        color: var(--widget-accent-action-text, var(--on-accent-text, #173326));
        background: var(
          --widget-accent-action-bg,
          rgba(var(--accent-color-rgb, 142, 214, 164), 0.88)
        );
        box-shadow: inset 0 0 0 1px
          var(
            --widget-accent-action-border,
            rgba(var(--accent-color-rgb, 142, 214, 164), 0.32)
          );
      }

      .widget-item-action[data-tone="muted"] {
        color: var(--widget-action-muted-text, var(--text-color, #f5fff8));
        background: var(--widget-action-muted-bg, rgba(255, 255, 255, 0.16));
        box-shadow: inset 0 0 0 1px
          var(--widget-action-muted-border, rgba(255, 255, 255, 0.14));
      }

      .widget-item-action[data-tone="success"] {
        color: var(--widget-accent-action-text, #173326);
        background: var(
          --widget-accent-action-bg,
          rgba(var(--accent-color-rgb, 142, 214, 164), 0.88)
        );
      }

      .widget-empty,
      .widget-state-shell {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 8px;
      }

      .widget-empty-title,
      .widget-state-title {
        font-size: 14px;
        font-weight: 700;
      }

      .widget-empty-detail,
      .widget-state-detail,
      .widget-preview-empty {
        font-size: 11px;
        line-height: 1.35;
        color: var(--muted-text-color, rgba(245, 255, 248, 0.74));
      }

      .widget-state-actions {
        display: flex;
        gap: 8px;
      }

      .widget-state-btn {
        min-width: 84px;
        height: 32px;
        border: 1px solid var(--widget-action-muted-border, rgba(255, 255, 255, 0.14));
        border-radius: 999px;
        background: var(--widget-action-muted-bg, rgba(255, 255, 255, 0.1));
        color: var(--widget-action-muted-text, var(--text-color, #f5fff8));
        font-size: 11px;
        cursor: pointer;
      }

      .widget-state-btn--primary {
        color: var(--widget-accent-action-text, var(--on-accent-text, #173326));
        background: var(
          --widget-accent-action-bg,
          rgba(var(--accent-color-rgb, 142, 214, 164), 0.88)
        );
      }
    </style>
  </head>
  <body class="controler-widget-window" data-controler-skip-electron-chrome="true">
    <div class="widget-window-shell">
      <div class="widget-window-chrome">
        <div class="widget-window-floatbar">
          <button
            class="widget-window-action widget-window-action--move"
            id="widget-window-move"
            type="button"
            title="拖动窗口"
            aria-label="拖动窗口"
          >移动</button>
          <button
            class="widget-window-action widget-window-action--close"
            id="widget-window-close"
            type="button"
            title="关闭"
            aria-label="关闭"
          >×</button>
        </div>
      </div>
      <div id="widget-root">
        <div class="widget-card">
          <div class="widget-state-shell">
            <div class="widget-state-title" id="widget-loading-title">桌面小组件</div>
            <div class="widget-state-detail">正在准备当前小组件内容...</div>
          </div>
        </div>
      </div>
    </div>
    <script>
      (() => {
        const closeButton = document.getElementById("widget-window-close");
        closeButton?.addEventListener("click", async (event) => {
          event.preventDefault();
          event.stopPropagation();
          if (typeof window.electronAPI?.windowClose === "function") {
            await window.electronAPI.windowClose();
            return;
          }
          window.close();
        });
      })();
    </script>
    <script
      src="widget.js"
      onerror="(function(){var title=document.getElementById('widget-loading-title');var detail=document.querySelector('.widget-state-detail');if(title){title.textContent='加载失败';}if(detail){detail.textContent='小组件脚本加载失败，请重启应用后重试。';}})()"
    ></script>
  </body>
</html>
