<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>时间计划</title>
        <script src="mobile-common-boot.js"></script>
    <script src="plan-boot.js"></script>
<link rel="stylesheet" href="index.css" />
    <style>
      body {
        margin: 0;
        height: 100vh;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
      }

      .planner-dashboard {
        display: grid;
        grid-template-columns: minmax(0, 1.65fr) minmax(280px, 0.95fr);
        gap: 18px;
        padding: 0 15px 15px;
        align-items: start;
        min-height: 0;
        height: auto;
        width: 100%;
        flex: 0 0 auto;
        overflow: visible;
        box-sizing: border-box;
      }

      .planner-panel {
        min-width: 0;
        padding: 15px;
        background-color: var(--bg-secondary);
        border-radius: 15px;
        display: flex;
        flex-direction: column;
        min-height: 0;
        height: auto;
        flex-shrink: 0;
        overflow: visible;
      }

      .planner-panel-title {
        margin: 0 0 15px 0;
        color: var(--text-color);
        flex-shrink: 0;
      }

      .planner-panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 15px;
        flex-wrap: wrap;
      }

      .planner-inline-action {
        margin: 0;
      }

      .planner-panel-note {
        color: var(--muted-text-color);
        font-size: 13px;
      }

      .todo-panel-stack {
        display: flex;
        flex-direction: column;
        gap: 15px;
        flex: 1 1 auto;
        min-height: 0;
        overflow: visible;
      }

      .todo-stats-card,
      .checkin-stats-card {
        min-width: 0;
      }

      .todo-item {
        background-color: var(--bg-tertiary);
        border-radius: 22px;
        padding: 12px;
        margin-bottom: 10px;
        color: var(--text-color);
        transition: all 0.3s ease;
        border-left: 5px solid var(--todo-item-accent, var(--accent-color));
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .todo-item.completed {
        opacity: 0.7;
        border-left-color: var(--bg-quaternary);
      }

      .todo-item.completed .todo-title {
        text-decoration: line-through;
      }

      .todo-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
      }

      .todo-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 0;
        gap: 10px;
        flex-wrap: wrap;
      }

      .todo-title {
        font-size: 16px;
        font-weight: bold;
        color: var(--text-color);
        margin: 0;
      }

      .todo-due-date {
        font-size: 14px;
        color: var(--accent-color);
        background-color: rgba(var(--accent-color-rgb), 0.18);
        padding: 4px 8px;
        border-radius: 6px;
      }

      .todo-due-date.overdue {
        background-color: rgba(255, 107, 107, 0.2);
        color: var(--delete-btn);
      }

      .todo-due-date.today {
        background-color: rgba(var(--accent-color-rgb), 0.26);
        color: var(--accent-color);
        font-weight: bold;
      }

      .todo-description {
        font-size: 13px;
        color: var(--muted-text-color);
        margin-bottom: 0;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .todo-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .todo-footer > * {
        min-width: 0;
      }

      .todo-tags {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        min-height: 0;
      }

      .todo-tag {
        font-size: 12px;
        padding: 4px 8px;
        background-color: var(--bg-quaternary);
        border-radius: 4px;
        color: var(--text-color);
      }

      .todo-actions {
        display: flex;
        gap: 8px;
      }

      .todo-action-stack {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .todo-action-btn {
        padding: 6px 12px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
      }

      .todo-progress-btn {
        background: color-mix(
          in srgb,
          var(--accent-color) 18%,
          var(--bg-quaternary)
        );
        color: var(--accent-color);
        border: 1px solid
          color-mix(in srgb, var(--accent-color) 45%, transparent);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        text-align: center;
      }

      .complete-btn {
        background-color: var(--accent-color);
        color: var(--on-accent-text);
      }

      .delete-btn {
        background-color: var(--delete-btn);
        color: white;
      }

      .edit-btn {
        background-color: var(--bg-quaternary);
        color: var(--text-color);
      }

      .todo-action-btn:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }

      .checkin-record {
        background-color: color-mix(
          in srgb,
          var(--bg-secondary) 78%,
          transparent
        );
        border-radius: 16px;
        padding: 8px 10px;
        margin-top: 8px;
      }

      .todo-progress-lane {
        flex: 1 1 220px;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .todo-progress-caption,
      .todo-progress-empty {
        color: var(--muted-text-color);
      }

      .checkin-records-inline {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 2px;
        scrollbar-width: thin;
        max-width: 100%;
      }

      .checkin-records-inline .checkin-record {
        margin-top: 0;
        flex: 0 0 auto;
      }

      .checkin-records-inline .checkin-message,
      .checkin-item .checkin-description {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .checkin-records-inline .checkin-message {
        -webkit-line-clamp: 1;
      }

      .checkin-item {
        box-sizing: border-box;
      }

      .todo-progress-record {
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          border-color 0.2s ease;
        border: 1px solid transparent;
      }

      .todo-progress-record:hover {
        transform: translateY(-1px);
        border-color: rgba(var(--accent-color-rgb), 0.28);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
      }

      .checkin-date {
        font-size: 12px;
        color: var(--muted-text-color);
      }

      .checkin-message {
        font-size: 14px;
        color: var(--text-color);
      }

      .category-filter {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 15px;
      }

      .todo-control-strip {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 12px;
        overflow: visible;
      }

      .todo-dropdown-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        min-width: 0;
      }

      .todo-dropdown-field {
        flex: 0 0 auto;
        min-width: 0;
      }

      .todo-dropdown-field .tree-select,
      .todo-dropdown-field .native-select-enhancer {
        width: fit-content;
        max-width: 100%;
        min-width: 0;
      }

      .filter-btn {
        padding: 8px 16px;
        border-radius: 8px;
        background-color: var(--bg-tertiary);
        color: var(--text-color);
        border: none;
        cursor: pointer;
        transition: all 0.2s;
      }

      .filter-btn.active {
        background-color: var(--accent-color);
        color: var(--on-accent-text);
      }

      .filter-btn:hover {
        background-color: var(--accent-color);
        color: var(--on-accent-text);
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-color);
      }

      .empty-state-icon {
        font-size: 48px;
        margin-bottom: 15px;
      }

      .todo-tools-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 15px;
        align-items: center;
      }

      .todo-tools-field {
        min-width: 0;
      }

      .todo-tools-input {
        width: 100%;
        box-sizing: border-box;
      }

      .todo-view-toggle .bts.active {
        background-color: var(--accent-color);
        color: var(--button-text);
      }

      .todo-primary-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .todo-primary-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .calendar-container {
        display: flex;
        flex-direction: column;
        min-height: 0;
        height: 100%;
      }

      .plan-calendar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .plan-view-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .plan-date-nav-group {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-left: auto;
      }

      .plan-current-date-display {
        color: var(--text-color);
        font-weight: bold;
        font-size: 18px;
      }

      .plan-nav-buttons {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      #stats-container {
        display: flex;
        flex-direction: column;
        min-height: 0 !important;
        height: auto;
        overflow: visible;
      }

      #todo-list-container,
      #todo-quadrant-container,
      #checkin-list-container {
        flex: 0 0 auto;
        min-height: 0 !important;
        width: 100%;
        overflow: visible;
      }

      #todo-panel-anchor,
      #todo-panel-anchor .todo-panel-stack,
      #todo-view-controls,
      #checkin-view-controls {
        overflow: visible;
      }

      @media (min-width: 691px) {
        .planner-dashboard {
          align-items: stretch;
        }

        .planner-dashboard > .planner-panel {
          height: 100%;
        }

        #todo-panel-anchor .todo-panel-stack > :last-child {
          margin-top: auto;
        }
      }

      @media (max-width: 1280px) {
        .planner-dashboard {
          grid-template-columns: minmax(0, 1.55fr) minmax(260px, 0.95fr);
        }
      }

      @media (max-width: 760px) {
        .todo-tools-row {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 690px) {
        body.page-plan .planner-dashboard {
          display: flex;
          flex-direction: row;
          gap: 0;
          padding: 0 6px 6px;
          min-height: 0;
          height: auto;
          overflow-x: auto;
          overflow-y: hidden;
          scroll-snap-type: x mandatory;
          scroll-snap-stop: always;
          scroll-behavior: smooth;
          scrollbar-width: none;
          overscroll-behavior-x: contain;
          overscroll-behavior-y: auto;
          contain: paint;
        }

        body.page-plan .planner-dashboard[data-pager-mode="mobile"] {
          -webkit-overflow-scrolling: touch;
          touch-action: pan-x pan-y;
        }

        body.page-plan .planner-dashboard[data-pager-mode="desktop"] {
          touch-action: pan-y;
        }

        body.page-plan .planner-dashboard .planner-panel--todos {
          order: -1;
        }

        body.page-plan .planner-dashboard .planner-panel--plans {
          order: 1;
        }

        body.page-plan .planner-dashboard::-webkit-scrollbar {
          display: none;
        }

        body.page-plan .planner-dashboard .planner-panel {
          flex: 0 0 100%;
          width: 100%;
          min-height: 0;
          height: auto;
          padding: 12px;
          border-radius: 12px;
          scroll-snap-align: start;
          scroll-snap-stop: always;
          contain: paint;
        }

        body.page-plan
          .planner-dashboard[data-pager-mode="desktop"].planner-dashboard--dragging {
          scroll-snap-type: none;
          scroll-behavior: auto;
          cursor: grabbing;
        }

        body.page-plan
          .planner-dashboard[data-pager-mode="desktop"]:not(.planner-dashboard--dragging) {
          cursor: grab;
        }

        body.page-plan.controler-android-native
          .planner-dashboard {
          transform: translateZ(0);
          backface-visibility: hidden;
          will-change: scroll-position;
        }

        body.page-plan.controler-android-native
          .planner-dashboard
          .planner-panel {
          transform: translateZ(0);
          backface-visibility: hidden;
          will-change: transform;
        }

        .planner-panel-header {
          margin-bottom: 10px;
        }

        .planner-panel-title {
          margin: 0;
          font-size: 18px;
        }

        .planner-inline-action {
          margin-left: auto;
          padding: 8px 12px;
          font-size: 13px;
        }

        .todo-panel-stack {
          gap: 10px;
        }

        .todo-primary-toolbar {
          flex-wrap: nowrap;
          align-items: stretch;
          gap: 6px;
        }

        .todo-primary-toolbar .todo-view-toggle {
          flex: 1 1 auto;
          width: auto;
          min-width: 0;
          gap: 6px !important;
        }

        .todo-primary-toolbar .todo-view-toggle .bts,
        .todo-primary-toolbar .todo-primary-actions .bts {
          margin: 0;
          padding: 6px 8px !important;
          font-size: 11px !important;
          min-width: 0;
        }

        .todo-primary-toolbar .todo-view-toggle .bts {
          flex: 1 1 0;
        }

        .todo-primary-toolbar .todo-primary-actions {
          flex: 0 0 auto;
          min-width: 0;
          gap: 6px;
        }

        .todo-primary-toolbar .todo-primary-actions .bts {
          white-space: nowrap;
        }

        .todo-dropdown-row,
        .todo-tools-row {
          gap: 8px;
        }

        .todo-dropdown-row {
          display: grid;
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 6px;
        }

        .todo-dropdown-field {
          flex: 1 1 0;
          width: 100%;
        }

        .todo-tools-field {
          flex: 1 1 100%;
          width: 100%;
        }

        .todo-dropdown-field .tree-select,
        .todo-dropdown-field .native-select-enhancer,
        .todo-dropdown-field select,
        .todo-tools-input {
          width: 100% !important;
        }

        .todo-dropdown-field :is(.tree-select-button, select) {
          padding: 6px 8px !important;
          font-size: 11px !important;
        }

        .todo-dropdown-field .tree-select-button-text {
          flex: 1 1 auto !important;
          min-width: 0 !important;
        }

        .todo-dropdown-field .tree-select-option {
          font-size: 11px !important;
        }

        .plan-calendar-header {
          gap: 8px !important;
        }

        .plan-view-buttons {
          width: 100%;
          flex-wrap: nowrap;
          gap: 6px !important;
        }

        .plan-view-buttons .bts {
          flex: 1 1 0;
          margin: 0;
          padding: 6px 8px !important;
          font-size: 11px !important;
        }

        .plan-date-nav-group {
          width: 100%;
          justify-content: space-between;
          flex-wrap: nowrap;
          gap: 8px;
        }

        .plan-current-date-display {
          font-size: 15px !important;
          min-width: 0;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .plan-nav-buttons {
          gap: 4px;
        }

        .plan-nav-buttons .bts {
          margin: 0;
          font-size: 11px !important;
        }

        .plan-nav-arrow-btn {
          padding: 6px 8px !important;
        }

        .plan-today-btn {
          padding: 6px 10px !important;
        }

        .todo-item {
          position: relative;
        }

        .todo-footer {
          align-items: flex-start;
        }

        .todo-progress-lane {
          width: 100%;
          padding-right: 76px;
        }

        .todo-action-stack {
          position: absolute;
          right: 12px;
          bottom: 12px;
          flex-direction: column;
          align-items: flex-end;
          gap: 6px;
        }

        .todo-action-btn {
          padding: 5px 10px !important;
          font-size: 11px !important;
        }

        #todo-view-controls > .todo-control-strip,
        #checkin-view-controls > div,
        #todo-list-container,
        #todo-quadrant-container,
        #checkin-list-container,
        #stats-container {
          border-radius: 12px !important;
        }

        #todo-list-container,
        #todo-quadrant-container,
        #checkin-list-container,
        #stats-container {
          min-height: 280px !important;
        }

        #todo-stats-panel,
        #checkin-stats-panel {
          grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
          gap: 6px !important;
        }

        #todo-stats-panel > .todo-stats-card--total,
        #checkin-stats-panel > .checkin-stats-card--total {
          grid-column: auto;
        }

        #todo-stats-panel > .todo-stats-card--total {
          display: block;
          padding-top: 15px !important;
          padding-bottom: 15px !important;
        }

        #todo-stats-panel > .todo-stats-card--total > :first-child,
        #checkin-stats-panel > .checkin-stats-card--total > :first-child {
          margin-bottom: 0 !important;
        }
      }
    </style>
  </head>
  <body class="app-layout page-plan plan-bootstrap-pending bgs bkg flex row">
    <div
      class="app-sidebar flex column ms mgt mgb"
      style="height: 100vh; width: 11%"
    >
      <div class="app-sidebar-spacer flex ms" style="height: 20%"></div>
      <div class="app-nav flex flex1 column ms mgt">
        <button class="bts" type="button" data-nav-page="index" onclick="if (window.ControlerUI?.navigateAppPage?.('index')) return false; window.location.href = 'index.html'; return false;">
          记录
        </button>
        <button class="bts" type="button" data-nav-page="stats" onclick="if (window.ControlerUI?.navigateAppPage?.('stats')) return false; window.location.href = 'stats.html'; return false;">
          统计
        </button>
        <button class="bts" type="button" data-nav-page="plan" onclick="if (window.ControlerUI?.navigateAppPage?.('plan')) return false; window.location.href = 'plan.html'; return false;">
          计划
        </button>
        <button class="bts" type="button" data-nav-page="diary" onclick="if (window.ControlerUI?.navigateAppPage?.('diary')) return false; window.location.href = 'diary.html'; return false;">
          日记
        </button>
        <button class="bts" type="button" data-nav-page="settings" onclick="if (window.ControlerUI?.navigateAppPage?.('settings')) return false; window.location.href = 'settings.html'; return false;">
          设置
        </button>
      </div>
    </div>
    <!-- 计划部分 -->
    <div
      class="app-main plan-main flex flex1 column mg ms"
      style="overflow-y: auto"
    >
      <div class="plan-topbar flex juzhong ms mg" style="height: 7%">
        <h2 style="margin: 0; color: var(--text-color)">时间计划</h2>
      </div>
      <div id="plan-guide-card" class="guide-card-host ms mg" hidden></div>
      <div
        id="plan-loading-overlay"
        class="page-loading-overlay"
        data-mode="fullscreen"
        aria-hidden="true"
        hidden
      >
        <div class="page-loading-card">
          <div class="page-loading-title" data-loading-title>正在加载数据中</div>
          <div class="page-loading-message" data-loading-message>
            正在读取当前计划范围，请稍候
          </div>
        </div>
      </div>

      <div class="planner-dashboard" id="planner-dashboard">
        <section
          class="planner-panel planner-panel--plans"
          data-mobile-panel="plans"
        >
          <div class="planner-panel-header planner-panel-header--plan">
            <h3 class="planner-panel-title">计划</h3>
            <button class="bts planner-inline-action" id="add-plan-btn-inline">
              ➕ 添加新计划
            </button>
          </div>
          <div
            id="stats-container"
            class="resizable-panel"
            style="min-height: auto; overflow: visible; flex: 0 0 auto"
          >
            <div
              style="
                color: var(--text-color);
                padding: 20px;
                text-align: center;
                min-height: auto;
              "
            >
              正在加载计划视图...
            </div>
          </div>
        </section>
        <!-- 待办事项部分 -->
        <section
          class="planner-panel planner-panel--todos"
          id="todo-panel-anchor"
          data-mobile-panel="todos"
        >
          <div class="planner-panel-header">
            <h3 class="planner-panel-title" style="margin: 0">待办事项</h3>
          </div>

          <div class="todo-panel-stack">
            <div
              class="todo-primary-toolbar"
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 10px;
              "
            >
              <div class="todo-view-toggle" style="display: flex; gap: 10px">
                <button class="bts active" id="todo-view-btn">
                  📝 待办事项
                </button>
                <button class="bts" id="checkin-view-btn">✅ 打卡项目</button>
              </div>
              <div
                class="todo-primary-actions"
                style="
                  display: flex;
                  align-items: center;
                  gap: 10px;
                  flex-wrap: wrap;
                "
              >
                <button class="bts" id="add-todo-btn">➕ 添加项目</button>
              </div>
            </div>

            <div id="todo-view-controls" style="display: block">
              <div class="todo-control-strip">
                <div class="todo-dropdown-row">
                  <div class="todo-dropdown-field">
                    <select
                      id="todo-filter-select"
                      class="todo-tools-input"
                      style="
