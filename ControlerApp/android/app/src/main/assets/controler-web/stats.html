<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>时间统计</title>
        <script defer src="mobile-common-boot.js"></script>
    <script defer src="stats-boot.js"></script>
<link rel="stylesheet" href="index.css" />
  </head>
  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
        sans-serif;
    }
  </style>
  <body class="app-layout page-stats stats-toolbar-bootstrap-pending bkg flex row">
    <!-- 侧边栏 -->
    <div
      class="app-sidebar flex column ms mgt mgb"
      style="height: 100vh; width: 11%"
    >
      <div class="app-sidebar-spacer flex ms" style="height: 20%"></div>
      <!-- 导航栏 -->
      <div class="app-nav flex flex1 column ms mgt">
        <button class="bts" type="button" data-nav-page="index" onclick="if (window.ControlerUI?.navigateAppPage?.('index')) return false; window.location.href = 'index.html'; return false;">
          记录
        </button>
        <button class="bts" type="button" data-nav-page="stats" onclick="if (window.ControlerUI?.navigateAppPage?.('stats')) return false; window.location.href = 'stats.html'; return false;">
          统计
        </button>
        <button class="bts" type="button" data-nav-page="plan" onclick="if (window.ControlerUI?.navigateAppPage?.('plan')) return false; window.location.href = 'plan.html'; return false;">
          计划
        </button>
        <button class="bts" type="button" data-nav-page="todo" onclick="if (window.ControlerUI?.navigateAppPage?.('todo')) return false; window.location.href = 'todo.html'; return false;">
          待办
        </button>
        <button class="bts" type="button" data-nav-page="diary" onclick="if (window.ControlerUI?.navigateAppPage?.('diary')) return false; window.location.href = 'diary.html'; return false;">
          日记
        </button>
        <button class="bts" type="button" data-nav-page="settings" onclick="if (window.ControlerUI?.navigateAppPage?.('settings')) return false; window.location.href = 'settings.html'; return false;">
          设置
        </button>
      </div>
    </div>
    <!-- 主要内容区域 -->
    <div
      class="app-main stats-main flex flex1 column mg ms"
      style="overflow-y: auto"
    >
      <div class="stats-topbar flex juzhong ms mg" style="height: 7%">
        <h2 style="margin: 0; color: var(--text-color)">时间统计</h2>
      </div>
      <div
        id="stats-loading-overlay"
        class="page-loading-overlay"
        data-mode="fullscreen"
        aria-hidden="true"
        hidden
      >
        <div class="page-loading-card">
          <div class="page-loading-title" data-loading-title>正在加载数据中</div>
          <div class="page-loading-message" data-loading-message>
            正在整理统计索引与范围数据，请稍候
          </div>
        </div>
      </div>

      <div
        class="stats-shell"
        style="
          margin: 15px;
          padding: 15px;
          background-color: var(--bg-quaternary);
          border-radius: 15px;
          display: flex;
          flex-direction: column;
          flex: 1;
          min-height: auto;
        "
      >
        <h3 style="margin: 0 0 15px 0; color: var(--text-color)">统计视图</h3>
        <div id="stats-toolbar" class="stats-toolbar">
          <div class="stats-toolbar-group stats-toolbar-group--sections">
            <select id="stats-section-select" style="min-width: 148px">
              <option value="table">表格视图</option>
              <option value="charts">饼状图和折线图</option>
              <option value="heatmap">日历热图</option>
            </select>
          </div>

          <div class="stats-toolbar-group stats-toolbar-group--range">
            <button
              class="bts time-quick-btn"
              id="stats-range-prev"
              style="margin: 0"
            >
              &lt;
            </button>
            <select id="stats-range-unit-select" style="min-width: 96px">
              <option value="day">天</option>
              <option value="week">周</option>
              <option value="month">月</option>
              <option value="year">年</option>
            </select>
            <button
              class="bts time-quick-btn"
              id="stats-range-next"
              style="margin: 0"
            >
              &gt;
            </button>
          </div>

          <div class="stats-toolbar-group stats-toolbar-group--dates">
            <label class="stats-date-field" for="start-date-select">
              <span>开始日期</span>
              <input type="date" id="start-date-select" class="date-input" />
            </label>

            <label class="stats-date-field" for="end-date-select">
              <span>结束日期</span>
              <input type="date" id="end-date-select" class="date-input" />
            </label>
          </div>
        </div>

        <!-- 统计内容容器 -->
        <div
          id="stats-container"
          class="resizable-panel"
          style="
            min-height: auto;
            overflow: visible;
            position: relative;
            display: flex;
            flex-direction: column;
            flex: 0 0 auto;
            gap: 16px;
            width: 100%;
          "
        >
          <div
            style="color: var(--text-color); padding: 20px; text-align: center"
          >
            选择时间范围并使用上方折叠按钮查看统计
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
